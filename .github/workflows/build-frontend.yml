name: Build frontend

# Builds the React SPA (including prerendering the landing page via
# vite-prerender-plugin) and commits the resulting stockpro-web/dist/ back
# to main, so Railway can deploy the prebuilt static files without running
# Node itself. Avoids the prerender-during-Railway-build hangs we hit before.

on:
  push:
    branches: [main]
    # Only rebuild when source changes — NOT when the bot commits dist back.
    paths:
      - 'stockpro-web/src/**'
      - 'stockpro-web/public/**'
      - 'stockpro-web/index.html'
      - 'stockpro-web/package.json'
      - 'stockpro-web/package-lock.json'
      - 'stockpro-web/vite.config.ts'
      - 'stockpro-web/tsconfig*.json'
      - '.github/workflows/build-frontend.yml'
  workflow_dispatch: {}

# Allow the job to push commits back to the repo.
permissions:
  contents: write

# If multiple frontend pushes land in quick succession, cancel earlier runs.
concurrency:
  group: build-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # The auto-generated GITHUB_TOKEN lets us push back to main below.
          persist-credentials: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: stockpro-web/package-lock.json

      - name: Install dependencies
        working-directory: stockpro-web
        run: npm ci

      - name: Build (with prerender)
        working-directory: stockpro-web
        env:
          # Public Clerk key — baked into the client bundle at build time.
          # Add via Repo → Settings → Secrets and variables → Actions.
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
        run: npm run build

      - name: Commit dist back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stockpro-web/dist
          if git diff --staged --quiet; then
            echo "No dist changes to commit."
          else
            git commit -m "build(frontend): rebuild dist [skip ci]"
            git push origin HEAD:main
          fi
