name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      FLASK_SECRET_KEY: ci-test-secret
      CLERK_SECRET_KEY: sk_test_ci
      CLERK_JWT_KEY: "-----BEGIN PUBLIC KEY-----\nMFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAE\n-----END PUBLIC KEY-----"
      CLERK_PUBLISHABLE_KEY: pk_test_ci
      GEMINI_API_KEY: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements-dev.txt

      # Ruff + Black: run locally (`ruff check src`, `black src`) — enable in CI after baseline format pass.

      - name: Import smoke test
        run: python scripts/verify_imports.py

      - name: Pytest with coverage
        run: |
          pytest -q --cov=src --cov-report=term-missing --cov-fail-under=35
