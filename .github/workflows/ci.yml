name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Lint has no database. Test job runs Postgres in a service container matching DATABASE_URL.
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check src

      - name: Black
        run: black --check src

      - name: Import smoke test
        run: python scripts/verify_imports.py

  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      FLASK_SECRET_KEY: ci-test-secret
      CLERK_SECRET_KEY: sk_test_ci
      CLERK_JWT_KEY: "-----BEGIN PUBLIC KEY-----\nMFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAE\n-----END PUBLIC KEY-----"
      CLERK_PUBLISHABLE_KEY: pk_test_ci
      GEMINI_API_KEY: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements-dev.txt

      - name: Initialize PostgreSQL schema
        run: |
          PYTHONPATH=src python -c "from database import get_database_manager; get_database_manager(); print('PostgreSQL schema ready')"

      - name: Pytest with coverage
        run: |
          pytest -q --cov=src --cov-report=term-missing --cov-fail-under=35
