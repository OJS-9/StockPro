<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{% block title %}StockPro - Intelligent Market Research{% endblock %}</title>
    <script>
        (function () {
            var stored = localStorage.getItem('theme');
            var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (stored === 'dark' || (!stored && prefersDark)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"
            integrity="sha384-NNQgBjjuhtXzPmmy4gurS5X7P4uTt1DThyevz4Ua0IVK5+kazYQI1W27JHjbbxQz"
            crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"
            integrity="sha384-+VfUPEb0PdtChMwmBcBmykRMDd+v6D/oFmB3rZM/puCMDYcIvF968OimRh4KQY9a"
            crossorigin="anonymous"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "base":      { DEFAULT: "#ffffff", dark: "#09090b" },
                        "surface":   { DEFAULT: "#fafafa", dark: "#18181b" },
                        "raised":    { DEFAULT: "#f4f4f5", dark: "#27272a" },
                        "edge":      { DEFAULT: "#e4e4e7", dark: "#3f3f46" },
                        "cta":       { DEFAULT: "#18181b", dark: "#fafafa" },
                        "cta-text":  { DEFAULT: "#fafafa", dark: "#09090b" },
                        "cta-hover": { DEFAULT: "#3f3f46", dark: "#d4d4d8" },
                        "gain":      { DEFAULT: "#16a34a", dark: "#22c55e" },
                        "loss":      { DEFAULT: "#dc2626", dark: "#ef4444" },
                    },
                    fontFamily: {
                        "display": ["Inter", "system-ui", "sans-serif"],
                        "body":    ["Inter", "system-ui", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                        "sm":   "0.375rem",
                        "md":   "0.5rem",
                        "lg":   "0.75rem",
                        "xl":   "1rem",
                        "2xl":  "1.25rem",
                        "full": "9999px",
                    },
                    boxShadow: {
                        "card":    "0 1px 3px 0 rgb(0 0 0 / 0.05), 0 1px 2px -1px rgb(0 0 0 / 0.05)",
                        "card-md": "0 4px 6px -1px rgb(0 0 0 / 0.07), 0 2px 4px -2px rgb(0 0 0 / 0.07)",
                        "card-lg": "0 10px 15px -3px rgb(0 0 0 / 0.08), 0 4px 6px -4px rgb(0 0 0 / 0.08)",
                    },
                },
            },
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #a1a1aa; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #71717a; }
        .dark ::-webkit-scrollbar-thumb { background: #3f3f46; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #52525b; }
        .mask-linear-fade {
            mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
        }
        .hero-bg-gradient {
            background-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.4) 0%, rgba(24, 24, 27, 0.95) 100%), var(--hero-graphic-url);
        }
        .dark .hero-bg {
            --hero-graphic-url: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none"><rect width="1200" height="600" fill="%2318181b"/><path d="M0 300L200 250L400 350L600 280L800 380L1000 320L1200 370V600H0V300Z" fill="url(%23gradientGreen)"/><path d="M0 400L200 370L400 430L600 390L800 450L1000 410L1200 460V600H0V400Z" fill="url(%23gradientGray)"/><path d="M0 200L200 230L400 170L600 210L800 150L1000 190L1200 140V600H0V200Z" fill="url(%23gradientRed)"/><defs><linearGradient id="gradientGreen" x1="0" y1="0" x2="0" y2="600" gradientUnits="userSpaceOnUse"><stop stop-color="%2322c55e" stop-opacity="0.5"/><stop offset="1" stop-color="%2322c55e" stop-opacity="0"/></linearGradient><linearGradient id="gradientGray" x1="0" y1="0" x2="0" y2="600" gradientUnits="userSpaceOnUse"><stop stop-color="%23a1a1aa" stop-opacity="0.15"/><stop offset="1" stop-color="%23a1a1aa" stop-opacity="0"/></linearGradient><linearGradient id="gradientRed" x1="0" y1="0" x2="0" y2="600" gradientUnits="userSpaceOnUse"><stop stop-color="%23ef4444" stop-opacity="0.35"/><stop offset="1" stop-color="%23ef4444" stop-opacity="0"/></linearGradient></defs></svg>');
        }
        .hero-bg {
            background-image: linear-gradient(to bottom, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0.95) 100%), var(--hero-graphic-url);
            --hero-graphic-url: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none"><rect width="1200" height="600" fill="%23fafafa"/><path d="M0 300L200 250L400 350L600 280L800 380L1000 320L1200 370V600H0V300Z" fill="url(%23gradientGreen)"/><path d="M0 400L200 370L400 430L600 390L800 450L1000 410L1200 460V600H0V400Z" fill="url(%23gradientGray)"/><path d="M0 200L200 230L400 170L600 210L800 150L1000 190L1200 140V600H0V200Z" fill="url(%23gradientRed)"/><defs><linearGradient id="gradientGreen" x1="0" y1="0" x2="0" y2="600" gradientUnits="userSpaceOnUse"><stop stop-color="%2316a34a" stop-opacity="0.2"/><stop offset="1" stop-color="%2316a34a" stop-opacity="0"/></linearGradient><linearGradient id="gradientGray" x1="0" y1="0" x2="0" y2="600" gradientUnits="userSpaceOnUse"><stop stop-color="%23a1a1aa" stop-opacity="0.1"/><stop offset="1" stop-color="%23a1a1aa" stop-opacity="0"/></linearGradient><linearGradient id="gradientRed" x1="0" y1="0" x2="0" y2="600" gradientUnits="userSpaceOnUse"><stop stop-color="%23dc2626" stop-opacity="0.15"/><stop offset="1" stop-color="%23dc2626" stop-opacity="0"/></linearGradient></defs></svg>');
        }
    </style>
    <script>
        function toggleTheme() {
            var isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }
    </script>
    <script async crossorigin="anonymous"
            data-clerk-publishable-key="{{ clerk_publishable_key }}"
            src="https://unpkg.com/@clerk/clerk-js@5.125.5/dist/clerk.browser.js"
            type="text/javascript"></script>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-white dark:bg-zinc-950 text-zinc-950 dark:text-zinc-50 font-body overflow-x-hidden min-h-screen flex flex-col">
    {% block content %}{% endblock %}
</body>
</html>
