<header class="sticky top-0 z-50 flex items-center justify-between whitespace-nowrap border-b border-solid border-b-stone-200 dark:border-b-border-dark bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-md px-4 sm:px-10 py-3">
    <div class="flex items-center gap-4 text-stone-900 dark:text-white">
        <a href="{{ url_for('index') }}" class="flex items-center gap-4">
            <div class="size-8 text-primary">
                <svg class="w-full h-full" fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                    <path d="M8.57829 8.57829C5.52816 11.6284 3.451 15.5145 2.60947 19.7452C1.76794 23.9758 2.19984 28.361 3.85056 32.3462C5.50128 36.3314 8.29667 39.7376 11.8832 42.134C15.4698 44.5305 19.6865 45.8096 24 45.8096C28.3135 45.8096 32.5302 44.5305 36.1168 42.134C39.7033 39.7375 42.4987 36.3314 44.1494 32.3462C45.8002 28.361 46.2321 23.9758 45.3905 19.7452C44.549 15.5145 42.4718 11.6284 39.4217 8.57829L24 24L8.57829 8.57829Z" fill="currentColor"></path>
                </svg>
            </div>
            <h2 class="text-stone-900 dark:text-white text-xl font-bold leading-tight tracking-[-0.015em] font-display">StockIntel</h2>
        </a>
    </div>
    <div class="hidden md:flex flex-1 justify-end gap-8">
        <div class="flex items-center gap-9">
            <a class="{{ 'text-primary text-sm font-bold' if request.endpoint == 'index' else 'text-stone-900 dark:text-white hover:text-primary transition-colors text-sm font-medium' }} leading-normal" href="{{ url_for('index') }}">Markets</a>
            <a class="{{ 'text-primary text-sm font-bold' if request.endpoint == 'report_history' else 'text-stone-900 dark:text-white hover:text-primary transition-colors text-sm font-medium' }} leading-normal" href="{{ url_for('report_history') }}">Reports</a>
            <a class="{{ 'text-primary text-sm font-bold' if request.endpoint in ['chat', 'continue_conversation', 'chat_with_report'] else 'text-stone-900 dark:text-white hover:text-primary transition-colors text-sm font-medium' }} leading-normal" href="{{ url_for('chat') }}">AI Agent</a>
            <a class="{{ 'text-primary text-sm font-bold' if request.endpoint in ['portfolio', 'add_transaction', 'import_csv', 'holding_detail'] else 'text-stone-900 dark:text-white hover:text-primary transition-colors text-sm font-medium' }} leading-normal" href="{{ url_for('portfolio') }}">Portfolio</a>
            <a class="{{ 'text-primary text-sm font-bold' if request.endpoint in ['watchlist', 'watchlist_create', 'watchlist_rename', 'watchlist_delete', 'watchlist_add_symbol', 'watchlist_remove_item', 'watchlist_toggle_pin', 'watchlist_create_section', 'watchlist_rename_section', 'watchlist_delete_section'] else 'text-stone-900 dark:text-white hover:text-primary transition-colors text-sm font-medium' }} leading-normal" href="{{ url_for('watchlist') }}">Watchlist</a>
        </div>
        <div class="flex gap-2 items-center">
            {% if current_user.is_authenticated %}
            <span class="flex items-center text-stone-900 dark:text-stone-300 text-sm font-medium px-3">{{ current_user.username }}</span>
            <a href="{{ url_for('logout') }}" class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-10 px-4 bg-stone-200 dark:bg-surface-dark text-stone-900 dark:text-white text-sm font-bold leading-normal tracking-[0.015em] hover:bg-opacity-80 transition-all">
                <span class="truncate">Logout</span>
            </a>
            {% else %}
            <a href="{{ url_for('register') }}" class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-10 px-4 bg-primary text-[#0c0a09] text-sm font-bold leading-normal tracking-[0.015em] hover:brightness-110 transition-all">
                <span class="truncate">Sign Up</span>
            </a>
            <a href="{{ url_for('login') }}" class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-10 px-4 bg-stone-200 dark:bg-surface-dark text-stone-900 dark:text-white text-sm font-bold leading-normal tracking-[0.015em] hover:bg-opacity-80 transition-all">
                <span class="truncate">Login</span>
            </a>
            {% endif %}
        </div>
    </div>
    <div class="md:hidden text-white">
        <span class="material-symbols-outlined cursor-pointer">menu</span>
    </div>
</header>
