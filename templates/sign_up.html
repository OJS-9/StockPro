{% extends "base.html" %}

{% block title %}StockPro - Sign Up{% endblock %}

{% block content %}
{% include '_nav.html' %}
<div class="min-h-[calc(100vh-57px)] flex items-center justify-center">
    <div class="w-full max-w-sm px-4">
        <div id="sign-up-container" class="min-h-[400px] flex items-center justify-center">
        </div>
    </div>
</div>
<script>
window.addEventListener('load', async () => {
    try {
        await Clerk.load();
        Clerk.mountSignUp(document.getElementById('sign-up-container'), {
            signUpForceRedirectUrl: '/auth/sso-callback',
            signUpFallbackRedirectUrl: '/auth/sso-callback',
            signInUrl: '/sign-in',
        });
    } catch (e) {
        document.getElementById('sign-up-container').innerHTML = '<p class="text-zinc-500 text-sm">Authentication service unavailable. Please try again later.</p>';
    }
});
</script>
{% endblock %}
