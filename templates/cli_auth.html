<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockPro CLI - Sign In</title>
    <script
      async
      crossorigin="anonymous"
      data-clerk-publishable-key="{{ clerk_publishable_key }}"
      src="https://unpkg.com/@clerk/clerk-js@5.125.5/dist/clerk.browser.js"
      type="text/javascript"
    ></script>
    <style>
        body { font-family: system-ui, sans-serif; background: #0c0a09; color: #d6d3d1; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { text-align: center; max-width: 400px; width: 100%; padding: 2rem; }
        h2 { margin-bottom: 1rem; }
        #sign-in-container { min-height: 400px; display: flex; align-items: center; justify-content: center; }
        .status { margin-top: 1rem; color: #a8a29e; font-size: 0.875rem; }
    </style>
</head>
<body>
    <div class="container">
        <h2>StockPro CLI Authentication</h2>
        <div id="sign-in-container"></div>
        <div id="status" class="status"></div>
    </div>
    <script>
    window.addEventListener('load', async () => {
        const callbackPort = {{ callback_port|tojson }};
        const statusEl = document.getElementById('status');
        try {
            await Clerk.load();
            if (Clerk.user) {
                statusEl.textContent = 'Getting token...';
                const token = await Clerk.session.getToken({ template: 'stockpro-cli' });
                if (token) {
                    window.location.href = 'http://127.0.0.1:' + callbackPort + '/callback?token=' + encodeURIComponent(token);
                    return;
                }
            }
            Clerk.mountSignIn(document.getElementById('sign-in-container'), {
                afterSignInUrl: window.location.href,
            });
            Clerk.addListener(async (event) => {
                if (event.user) {
                    statusEl.textContent = 'Getting token...';
                    const token = await Clerk.session.getToken({ template: 'stockpro-cli' });
                    if (token) {
                        window.location.href = 'http://127.0.0.1:' + callbackPort + '/callback?token=' + encodeURIComponent(token);
                    }
                }
            });
        } catch (e) {
            statusEl.textContent = 'Authentication service unavailable. Please try again later.';
        }
    });
    </script>
</body>
</html>
