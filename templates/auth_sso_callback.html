{% extends "base.html" %}

{% block title %}StockIntel - Signing you in{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-background-dark">
    <div class="flex flex-col items-center gap-4">
        <span class="material-symbols-outlined text-4xl text-primary animate-pulse">sync</span>
        <p class="text-stone-400 font-body">Completing sign-in…</p>
    </div>
</div>
<script>
window.addEventListener('load', async () => {
    const redirectUrl = {{ redirect_url|tojson }};
    try {
        await Clerk.load();
        if (typeof Clerk.handleRedirectCallback === 'function') {
            await Clerk.handleRedirectCallback();
        }
    } catch (e) {
        console.warn('SSO callback:', e);
    }
    window.location.replace(redirectUrl);
});
</script>
{% endblock %}
