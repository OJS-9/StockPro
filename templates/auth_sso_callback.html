{% extends "base.html" %}

{% block title %}StockPro - Signing you in{% endblock %}

{% block content %}
{% include '_nav.html' %}
<div class="min-h-[calc(100vh-57px)] flex items-center justify-center">
    <div class="flex flex-col items-center gap-4">
        <span class="material-symbols-outlined text-4xl text-zinc-400 animate-pulse">sync</span>
        <p class="text-zinc-500 text-sm">Completing sign-in…</p>
    </div>
</div>
<script>
window.addEventListener('load', async () => {
    const redirectUrl = {{ redirect_url|tojson }};
    try {
        await Clerk.load();
        if (typeof Clerk.handleRedirectCallback === 'function') {
            await Clerk.handleRedirectCallback();
        }
    } catch (e) {
        console.warn('SSO callback:', e);
    }
    window.location.replace(redirectUrl);
});
</script>
{% endblock %}
