    <!-- Structured data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What makes StockPro different from a normal stock screener?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "StockPro runs 12 specialized AI research agents in parallel — fundamentals, technicals, risk, competitive landscape, news sentiment, and more — and synthesizes their output into a structured research report. Traditional screeners filter tickers by metrics; StockPro explains the company."
          }
        },
        {
          "@type": "Question",
          "name": "Which AI models power StockPro's research?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We use Google Gemini 2.5 Pro for the specialized research and synthesis agents, and Gemini 2.5 Flash for orchestration, planning, and the report-chat assistant. Agents are orchestrated through LangGraph and pull data from yfinance, Alpha Vantage, and Nimble."
          }
        },
        {
          "@type": "Question",
          "name": "Is StockPro free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. StockPro has a free tier with no credit card required — you can generate research reports, track a portfolio, build watchlists, and set price alerts. Paid plans add higher report limits and premium features."
          }
        },
        {
          "@type": "Question",
          "name": "Can AI replace a human stock analyst?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No, and we don't pitch it as a replacement. AI is best at quickly synthesizing structured information — earnings, filings, news, technicals — so you can form your own view faster. Final investment decisions still require human judgment about risk tolerance, time horizon, and conviction."
          }
        },
        {
          "@type": "Question",
          "name": "How accurate is AI-generated stock research?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Accuracy depends on the data sources and the model's reasoning. We ground every report in real market data (yfinance, Alpha Vantage) and live web sources, and we run a quality gate before synthesis to reject low-confidence agent outputs. Reports are informational, not investment advice."
          }
        },
        {
          "@type": "Question",
          "name": "What data sources does AI stock research use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "StockPro pulls from yfinance for fundamentals and prices, Alpha Vantage for news sentiment, CoinGecko for crypto, and the Nimble agent for live web search and Perplexity-style research. Reports cite the underlying sources where applicable."
          }
        },
        {
          "@type": "Question",
          "name": "What's the best AI tool for researching stocks?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "StockPro is purpose-built for stock and crypto research — unlike general chatbots, it runs a multi-agent research pipeline that gathers fundamentals, technicals, risk, and news in parallel, then synthesizes a structured report you can chat with. Free to try at stock-pro.org."
          }
        },
        {
          "@type": "Question",
          "name": "How do I track a stock portfolio with AI?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "In StockPro, you create one or more portfolios, add transactions (buy/sell, manually or via CSV), and the app tracks cost basis, P&L, sector allocation, and history automatically. AI research is then framed against your actual positions."
          }
        },
        {
          "@type": "Question",
          "name": "Can I get AI alerts when a stock hits a target price?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. StockPro lets you set price-level alerts for any stock or crypto. When the trigger fires, you get an in-app notification and an optional Telegram message — no need to keep checking quotes."
          }
        }
      ]
    }
    </script>
